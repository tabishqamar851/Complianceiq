<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ComplianceIQ — Login</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #060a0f;
    --bg2: #0c1420;
    --border: #1e3048;
    --accent: #00d4ff;
    --accent2: #00ff88;
    --text: #e2eaf4;
    --muted: #5a7a9a;
    --card: #0d1a28;
    --danger: #ff3b5c;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }
  .login-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px 36px;
    width: 100%;
    max-width: 420px;
    position: relative;
    z-index: 1;
  }
  .logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .logo-text {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    color: var(--accent);
  }
  .logo-text span { color: var(--accent2); }
  .logo-sub {
    font-size: 11px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 4px;
  }
  .tabs {
    display: flex;
    background: #0a1520;
    border-radius: 8px;
    padding: 4px;
    margin-bottom: 24px;
  }
  .tab {
    flex: 1;
    padding: 8px;
    text-align: center;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    transition: all 0.2s;
  }
  .tab.active { background: var(--accent); color: var(--bg); }
  .form-group { margin-bottom: 16px; }
  label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  input {
    width: 100%;
    background: #0a1520;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 11px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: var(--accent); }
  input::placeholder { color: var(--muted); }
  .btn-main {
    width: 100%;
    padding: 12px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.2s;
  }
  .btn-main:hover { background: #00aacc; transform: translateY(-1px); }
  .btn-main:disabled { background: var(--border); cursor: not-allowed; transform: none; }
  .error-msg {
    background: rgba(255,59,92,0.1);
    border: 1px solid rgba(255,59,92,0.3);
    color: var(--danger);
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
  }
  .success-msg {
    background: rgba(0,255,136,0.1);
    border: 1px solid rgba(0,255,136,0.3);
    color: var(--accent2);
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
  }
  .divider {
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    margin: 16px 0;
    font-family: 'DM Mono', monospace;
  }
</style>
</head>
<body>
<div class="login-box">
  <div class="logo">
    <div class="logo-text">Compliance<span>IQ</span></div>
    <div class="logo-sub">Finance & Banking Compliance Suite</div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchAuthTab('login')">Login</div>
    <div class="tab" onclick="switchAuthTab('signup')">Sign Up</div>
  </div>

  <div id="error-msg" class="error-msg"></div>
  <div id="success-msg" class="success-msg"></div>

  <!-- Login Form -->
  <div id="login-form">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="your@email.com" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••" />
    </div>
    <button class="btn-main" onclick="handleLogin()" id="login-btn">Login →</button>
  </div>

  <!-- Signup Form -->
  <div id="signup-form" style="display:none">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="signup-name" placeholder="Muhammad Ali" />
    </div>
    <div class="form-group">
      <label>Firm Name</label>
      <input type="text" id="signup-firm" placeholder="Ali & Associates CA Firm" />
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="signup-email" placeholder="your@email.com" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="signup-password" placeholder="Min 6 characters" />
    </div>
    <button class="btn-main" onclick="handleSignup()" id="signup-btn">Create Account →</button>
  </div>

  <div class="divider">Secure · Encrypted · GDPR Compliant</div>
</div>

<script>
  const SUPABASE_URL = 'https://fgzvopkgeycbiwmwfnvj.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_EPWlLAN88ro-_xs1bnyZsQ_bmQIsfVd';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // Check if already logged in
  supabase.auth.getSession().then(({ data }) => {
    if (data.session) window.location.href = 'dashboard.html';
  });

  function switchAuthTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('signup-form').style.display = tab === 'signup' ? 'block' : 'none';
    hideMessages();
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = '⚠️ ' + msg;
    el.style.display = 'block';
    document.getElementById('success-msg').style.display = 'none';
  }

  function showSuccess(msg) {
    const el = document.getElementById('success-msg');
    el.textContent = '✓ ' + msg;
    el.style.display = 'block';
    document.getElementById('error-msg').style.display = 'none';
  }

  function hideMessages() {
    document.getElementById('error-msg').style.display = 'none';
    document.getElementById('success-msg').style.display = 'none';
  }

  async function handleLogin() {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const btn = document.getElementById('login-btn');

    if (!email || !password) return showError('Email aur password daalen');

    btn.disabled = true;
    btn.textContent = 'Logging in...';

    const { data, error } = await supabase.auth.signInWithPassword({ email, password });

    if (error) {
      showError('Login failed: ' + error.message);
      btn.disabled = false;
      btn.textContent = 'Login →';
    } else {
      showSuccess('Login successful! Redirecting...');
      setTimeout(() => window.location.href = 'dashboard.html', 1000);
    }
  }

  async function handleSignup() {
    const name = document.getElementById('signup-name').value.trim();
    const firm = document.getElementById('signup-firm').value.trim();
    const email = document.getElementById('signup-email').value.trim();
    const password = document.getElementById('signup-password').value;
    const btn = document.getElementById('signup-btn');

    if (!name || !email || !password) return showError('Sab fields fill karein');
    if (password.length < 6) return showError('Password kam az kam 6 characters ka hona chahiye');

    btn.disabled = true;
    btn.textContent = 'Creating account...';

    const { data, error } = await supabase.auth.signUp({
      email, password,
      options: { data: { full_name: name, firm_name: firm } }
    });

    if (error) {
      showError(error.message);
      btn.disabled = false;
      btn.textContent = 'Create Account →';
    } else {
      showSuccess('Account ban gaya! Email verify karein phir login karein.');
      btn.disabled = false;
      btn.textContent = 'Create Account →';
    }
  }
</script>
</body>
</html>
